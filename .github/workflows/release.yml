name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ─── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86-64 (native) ────────────────────────────────────────────
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            ext: ""

          # ── Linux ARM64 (native GitHub-hosted runner) ────────────────────────
          - runner: ubuntu-22.04-arm
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            ext: ""

          # ── Windows x86-64 (CGO via MSYS2/MinGW64) ──────────────────────────
          - runner: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: ".exe"

          # ── macOS ARM64 / Apple Silicon (macos-14+ runners are M1/arm64) ─────
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      # ── Linux system dependencies (X11, Tesseract, PNG …) ──────────────────
      - name: Install Linux system dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            gcc libc6-dev \
            libx11-dev xorg-dev libxtst-dev \
            xsel xclip \
            libpng++-dev \
            xcb libxcb-xkb-dev x11-xkb-utils \
            libx11-xcb-dev libxkbcommon-x11-dev libxkbcommon-dev \
            libtesseract-dev libleptonica-dev

      # ── macOS: Tesseract (built-in clang handles CGO) ───────────────────────
      - name: Install macOS dependencies
        if: matrix.goos == 'darwin'
        run: brew install tesseract

      # ── Windows: MSYS2/MinGW64 provides GCC + Tesseract dev headers ─────────
      - name: Setup MSYS2 (Windows)
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          # add-to-path: true is the default – prepends mingw64/bin to PATH
          # so that gcc & pkg-config used by CGO come from MinGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-tesseract-ocr
            mingw-w64-x86_64-leptonica
            mingw-w64-x86_64-pkg-config

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build (Linux / macOS)
        if: matrix.goos != 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          go build -ldflags "-s -w" \
            -o "go_computer_use_mcp_server-${{ matrix.suffix }}" .

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "1"
          # Point pkg-config at MSYS2 MinGW64 packages
          PKG_CONFIG_PATH: "C:/msys64/mingw64/lib/pkgconfig"
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          go build -ldflags "-s -w" \
            -o "go_computer_use_mcp_server-windows-amd64.exe" .

      # ── Upload artifact for the release job ─────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: go_computer_use_mcp_server-${{ matrix.suffix }}${{ matrix.ext }}
          retention-days: 1

  # ─── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically generate release notes from commits since the previous tag
          generate_release_notes: true
          files: dist/*
          # Overwrite existing release assets if the tag already exists
          # (needed when re-releasing the same version with release-force)
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
