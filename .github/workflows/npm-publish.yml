name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: NPM_TOKEN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc libc6-dev \
            libx11-dev xorg-dev libxtst-dev \
            xsel xclip \
            libpng++-dev \
            xcb libxcb-xkb-dev x11-xkb-utils \
            libx11-xcb-dev libxkbcommon-x11-dev libxkbcommon-dev \
            libtesseract-dev libleptonica-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build npm package (platform binary)
        run: npm run build:npm

      - name: Validate MCP Registry metadata
        run: |
          npm run validate:registry
          node <<'NODE'
          const fs = require("node:fs");

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const server = JSON.parse(fs.readFileSync("server.json", "utf8"));
          const version = fs.readFileSync("VERSION", "utf8").trim();
          const npmPackage = server.packages.find((entry) => entry.registryType === "npm");
          const tag = process.env.GITHUB_REF_TYPE === "tag"
            ? process.env.GITHUB_REF_NAME.replace(/^v/, "")
            : null;

          const failures = [];
          if (pkg.mcpName !== server.name) {
            failures.push(`package.json mcpName (${pkg.mcpName}) must match server.json name (${server.name})`);
          }
          if (pkg.version !== server.version) {
            failures.push(`package.json version (${pkg.version}) must match server.json version (${server.version})`);
          }
          if (version !== server.version) {
            failures.push(`VERSION (${version}) must match server.json version (${server.version})`);
          }
          if (!npmPackage) {
            failures.push("server.json must contain an npm package entry");
          } else {
            if (npmPackage.identifier !== pkg.name) {
              failures.push(`server.json npm identifier (${npmPackage.identifier}) must match package.json name (${pkg.name})`);
            }
            if (npmPackage.version !== pkg.version) {
              failures.push(`server.json npm package version (${npmPackage.version}) must match package.json version (${pkg.version})`);
            }
          }
          if (tag && tag !== pkg.version) {
            failures.push(`git tag (${process.env.GITHUB_REF_NAME}) must match package.json version (${pkg.version})`);
          }

          if (failures.length > 0) {
            console.error(failures.join("\n"));
            process.exit(1);
          }
          NODE

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Wait for npm package availability
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          for attempt in {1..20}; do
            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 15
          done

          npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
